    DeleteOutwardAccountResponse:
      type: object
      required: [account, archivedConnectionCount]
      properties:
        account:
          $ref: "#/components/schemas/OutwardAccount"
        archivedConnectionCount:
          type: integer
          description: How many user_connections rows were soft-archived as part of the delete.

    OutwardAccountReassignImpact:
      type: object
      required: [totalCount, moveCount, collisionCount, toMove, toArchive]
      properties:
        totalCount:
          type: integer
          description: Live connections currently touching this outward account on either side.
        moveCount:
          type: integer
          description: How many of those would actually be reassigned to the target.
        collisionCount:
          type: integer
          description: |
            How many would be archived instead because the target already has a
            connection with the same other party in the same direction (or because
            reassigning would point the target at itself).
        toMove:
          type: array
          description: The connections that would actually move, with the other party on each.
          items:
            $ref: "#/components/schemas/ReassignImpactConnection"
        toArchive:
          type: array
          description: The connections that would be archived because the target already has the same connection (or it would self-connect), with the other party on each.
          items:
            $ref: "#/components/schemas/ReassignImpactConnection"

