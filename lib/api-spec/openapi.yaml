          items:
            $ref: "#/components/schemas/PublicTeamMember"

    InviteTeamMemberBody:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/TeamRole"
        clerkId:
          type: string
        username:
          type: string
        email:
          type: string
        chip:
          type: string
          nullable: true
          description: |
            #548 — Optional teammate chip the admin assigns at invite
            time. Curated value from the company-kind list (or "other").
        chipOther:
          type: string
          nullable: true
          description: Free-text label when chip === "other".
        companyKind:
          type: string
          nullable: true
          description: |
            Active company skin's kind ("trade_pro" or "facilities").
            Used server-side to validate `chip` against the right
            curated list.

    UpdateTeamMemberChipBody:
      type: object
      properties:
        chip:
          type: string
          nullable: true
        chipOther:
          type: string
          nullable: true
        companyKind:
          type: string
          nullable: true

    UpdateTeamMemberChipResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        chip:
          type: string
          nullable: true
        chipOther:
          type: string
          nullable: true

    SearchUserResult:
      type: object
      required: [id, clerkId, name, username, avatarUrl]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        outwardAccountId:
          type: integer
          nullable: true
          description: |
            #636 — The id of the outward account ("skin") this row
            represents. People search returns one row per
            non-archived skin so that admin/operator skins (Game
            Room Admin, Facility Admin, …) are discoverable
            alongside their owner's personal/collab baseline.
            Callers should use this id when scoping the Connect
            and message flows to the specific skin a searcher
            tapped. NULL only for legacy users that don't have any
            outward account yet.
        name:
          type: string
          description: |
            Public-facing display name for this skin. Falls back
            to the @username for non-personal skins so the owner's
            private name (#617) never leaks through.
        username:
          type: string
        avatarUrl:
          type: string
        activeModeKind:
          $ref: "#/components/schemas/UserModeKind"
          nullable: true
          description: |
            The skin's role kind (trade_pro, facilities, home, …).
            UI uses this to render the small role label that sits
            next to the name on each search row.

    ConnectionKind:
      type: string
      enum: [client, core, collaborator]

    ConnectionStatus:
      type: string
      description: |
        Lifecycle of a team-up connection between two outward accounts (#501):
          - `pending`: a team-up request was sent and is awaiting a response.
          - `accepted`: both sides are connected and may message + collaborate.
          - `declined`: the recipient declined the request.
          - `removed`: a previously-accepted connection was removed by either side.
        `declined` and `removed` rows are reactivated as a fresh `pending`
        request when either side calls /users/{userId}/connect again.
      enum: [pending, accepted, declined, removed]

    ConnectionClassification:
      type: string
      enum: [worker, outside_service_provider]
      description: |
        #502 — Trade Pro classification picked by a Homeowner / Facility
        when connecting. Drives the per-property permission scope. Null
        on collaborator and home↔home connections.

    ConnectionCadence:
      type: string
      enum: [occasional, recurring]
      description: |
        #504 — Hire-cadence sub-bucket chosen by the from-side (the
        hirer). Drives the Occasional / Recurring split inside the
        Outside Services / Trade Pros bucket on the My Team screens.
        Defaults to `occasional` on first connect.

    ConnectionOnSiteIdentity:
      type: string
      enum: [contractor, handyman, specialist, technician, vendor, other]
      description: |
        #502 — Trade Pro on-site identity chip; rendered directly under
        their service-title label everywhere the pro appears for that
        client. `other` is used together with `onSiteIdentityOther`.

    ConnectionCollaboratorChip:
      type: string
      enum:
        [
          mom,
          dad,
          spouse,
          sibling,
          boyfriend,
          girlfriend,
          old_friend,
          new_friend,
          friend,
          neighbor,
          designer,
          other,
        ]
      description: |
        #502 — Collaborator chip picked by the collaborator themselves.
        `other` is used together with `chipOther`. `boyfriend` /
        `girlfriend` render with a small heart in the UI.

    ConnectionTagFields:
      type: object
      description: |
        #502 — Subset of fields used to render the universal
        `Name → Label · Chip` pattern everywhere a person appears.
        All optional; any subset can be supplied at /connect time
        and edited later via PATCH /users/me/connections/{id}.
      properties:
        classification:
          $ref: "#/components/schemas/ConnectionClassification"
          nullable: true
        cadence:
          $ref: "#/components/schemas/ConnectionCadence"
          nullable: true
        serviceTitle:
          type: string
          nullable: true
          maxLength: 200
          description: |
            Label rendered under the pro's name for this client. Picked
            by the pro from their own Services profile chips.
        onSiteIdentity:
          $ref: "#/components/schemas/ConnectionOnSiteIdentity"
          nullable: true
        onSiteIdentityOther:
          type: string
          nullable: true
          maxLength: 80
          description: Free-text label used when `onSiteIdentity = other`.
        chip:
          $ref: "#/components/schemas/ConnectionCollaboratorChip"
          nullable: true
        chipOther:
          type: string
          nullable: true
          maxLength: 80
          description: Free-text label used when `chip = other`.

    ConnectUserRequest:
      type: object
      required: [kind]
      allOf:
        - $ref: "#/components/schemas/ConnectionTagFields"
      properties:
        kind:
          $ref: "#/components/schemas/ConnectionKind"
        status:
          $ref: "#/components/schemas/ConnectionStatus"
        outwardAccountId:
          type: integer
          description: Optional target outward account id (skin) to address.
        personalNote:
          type: string
          maxLength: 500
          description: |
            Optional personal note attached to the team-up request. Stored
            alongside the system-generated invite message and shown to the
            recipient when they review pending requests.

    ConnectUserResponse:
      type: object
      required: [ok, kind, status]
      properties:
        ok:
          type: boolean
        kind:
          $ref: "#/components/schemas/ConnectionKind"
        status:
          $ref: "#/components/schemas/ConnectionStatus"

    TeamUpRequest:
      type: object
      required:
        [
          id,
          direction,
          kind,
          inviteMessage,
          personalNote,
          requestedAt,
          otherClerkId,
          otherOutwardAccountId,
          otherName,
          otherCompanyName,
          otherAvatarUrl,
          otherKind,
        ]
      allOf:
        - $ref: "#/components/schemas/ConnectionTagFields"
      properties:
        id: { type: integer }
        direction:
          type: string
          enum: [incoming, outgoing]
        kind:
          $ref: "#/components/schemas/ConnectionKind"
        inviteMessage:
          type: string
          nullable: true
        personalNote:
          type: string
          nullable: true
        requestedAt:
          type: string
          nullable: true
        otherClerkId:
          type: string
          nullable: true
        otherOutwardAccountId:
          type: integer
        otherName:
          type: string
        otherCompanyName:
          type: string
          nullable: true
        otherAvatarUrl:
          type: string
          nullable: true
        otherKind:
          type: string
          nullable: true

    MyTeamUpRequestsResponse:
      type: object
      required: [incoming, outgoing]
      properties:
        incoming:
          type: array
          items: { $ref: "#/components/schemas/TeamUpRequest" }
        outgoing:
          type: array
          items: { $ref: "#/components/schemas/TeamUpRequest" }

    ConnectionStatusEntry:
      type: object
      required: [clerkId, kind, status]
      properties:
        clerkId:
          type: string
        kind:
          $ref: "#/components/schemas/ConnectionKind"
        status:
          $ref: "#/components/schemas/ConnectionStatus"

    ConnectionStatusResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionStatusEntry"

    PublicProfile:
      type: object
      required: [user, intakeSnapshot, isSelf]
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        activeModeKind:
          $ref: "#/components/schemas/UserModeKind"
          nullable: true
        intakeSnapshot:
          type: object
          additionalProperties: true
        connection:
          type: object
          nullable: true
          required: [id, kind, status]
          allOf:
            - $ref: "#/components/schemas/ConnectionTagFields"
          properties:
            id:
              type: integer
            kind:
              $ref: "#/components/schemas/ConnectionKind"
            status:
              $ref: "#/components/schemas/ConnectionStatus"
        myReverseConnection:
          type: object
          nullable: true
          required: [id, kind, status]
          description: |
            #502 — Reciprocal user_connections row (target → viewer) when
            it exists. Lets the viewer PATCH to-side-owned tag fields
            (chip / chipOther) — i.e. the chip rendered next to their own
            name on the other party's screens.
          properties:
            id:
              type: integer
            kind:
              $ref: "#/components/schemas/ConnectionKind"
            status:
              $ref: "#/components/schemas/ConnectionStatus"
            chip:
              $ref: "#/components/schemas/ConnectionCollaboratorChip"
              nullable: true
            chipOther:
              type: string
              nullable: true
              maxLength: 80
        counterpartOutwardAccount:
          type: object
          nullable: true
          description: |
            Task #671 — When the caller passes `outwardAccountId` and that
            OA exists, is owned by the profile being viewed, and is not
            archived, this is the picked skin's public-facing fields so
            PublicProfileModal can render a header chip identifying the
            specific company / role the visitor is connecting to.
            Null when no OA was requested or the requested OA is not a
            valid skin of this user.
          required: [id, kind]
          properties:
            id:
              type: integer
            kind:
              $ref: "#/components/schemas/UserModeKind"
            title:
              type: string
              nullable: true
            displayName:
              type: string
              nullable: true
            companyName:
              type: string
              nullable: true
            avatarUrl:
              type: string
              nullable: true
              description: |
                Task #678 — The picked skin's brand avatar. When set,
                PublicProfileModal renders this as the hero avatar
                instead of the owner's personal `users.avatarUrl`, so
                an operator skin (e.g. a Game Room Admin) shows its
                company logo rather than the underlying owner's
                headshot. Falls back to the owner's avatar when null.
            bannerUrl:
              type: string
              nullable: true
              description: |
                Task #678 — The picked skin's banner / header image.
                Surfaced alongside `avatarUrl` so the public profile
                hero can render the skin's brand banner instead of the
                owner's. Null when the skin hasn't set one.
        isSelf:
          type: boolean
        serviceStoryCounts:
          type: object
          nullable: true
          additionalProperties:
            type: integer
          description: |
            Map of service name → count of this pro's success stories tagged with
            that service. Null when the viewer is not allowed to see analytics
            for this pro (visibility.analytics === false and viewer is not self).

