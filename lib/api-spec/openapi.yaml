    EntityMemberDirection:
      type: string
      enum: [invite, request]
      description: |
        How the membership row was originated — `invite` (controller
        added the avatar) or `request` (avatar asked to join).

    EntityMemberPermissions:
      type: object
      description: |
        Per-membership feature toggles. Sparsely populated — undefined
        keys mean "not granted". `classification` carries the
        per-property worker / outside_service_provider / collaborator
        bucket, and `legacyConnectionId` carries the originating
        `user_connections` row id from the #663 migration.
      properties:
        seeContacts: { type: boolean }
        seeBilling: { type: boolean }
        createOnProperties: { type: boolean }
        manageTeam: { type: boolean }
        classification:
          type: string
          nullable: true
        legacyConnectionId:
          type: integer
          nullable: true

    EntityBusinessDetails:
      type: object
      description: |
        Sidecar for `kind='business'` entities. The base entity row
        stays narrow; non-business kinds simply omit this object.
      required: [entityId]
      properties:
        entityId:
          type: integer
        legacyOutwardAccountId:
          type: integer
          nullable: true
        tagline:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Entity:
      type: object
      required:
        - id
        - kind
        - name
        - controllerOutwardAccountId
        - controllerUserClerkId
        - createdByUserClerkId
        - isAdminDemo
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/EntityKind"
        name:
          type: string
        bio:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        coverPhotoUrl:
          type: string
          nullable: true
        coverColor:
          type: string
          nullable: true
        controllerOutwardAccountId:
          type: integer
        controllerUserClerkId:
          type: string
        createdByUserClerkId:
          type: string
        isAdminDemo:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    EntityWithBusinessDetails:
      allOf:
        - $ref: "#/components/schemas/Entity"
        - type: object
          required: [businessDetails]
          properties:
            businessDetails:
              nullable: true
              $ref: "#/components/schemas/EntityBusinessDetails"

    EntityMember:
      type: object
      required:
        - id
        - entityId
        - userClerkId
        - userOutwardAccountId
        - role
        - status
        - direction
        - permissions
        - createdAt
      properties:
        id:
          type: integer
        entityId:
          type: integer
        userClerkId:
          type: string
        userOutwardAccountId:
          type: integer
        role:
          $ref: "#/components/schemas/EntityMemberRole"
        status:
          $ref: "#/components/schemas/EntityMemberStatus"
        direction:
          $ref: "#/components/schemas/EntityMemberDirection"
        permissions:
          $ref: "#/components/schemas/EntityMemberPermissions"
        requestedByOutwardAccountId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true

    EntityMemberPublicUser:
      type: object
      required: [clerkId]
      description: Trimmed user fields returned alongside a membership row.
      properties:
        clerkId:
          type: string
        name:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        username:
          type: string
          nullable: true

    EntityMemberOutwardAccount:
      type: object
      required: [id, kind]
      description: Trimmed outward_account fields returned alongside a membership row.
      properties:
        id:
          type: integer
        kind:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true

    EntityMemberWithUser:
      allOf:
        - $ref: "#/components/schemas/EntityMember"
        - type: object
          required: [user, outwardAccount]
          properties:
            user:
              nullable: true
              $ref: "#/components/schemas/EntityMemberPublicUser"
            outwardAccount:
              nullable: true
              $ref: "#/components/schemas/EntityMemberOutwardAccount"

    MyEntityListItem:
      type: object
      description: |
        Shape returned by `GET /entities/mine`. `displayName` is the
        entity's `name` re-cast for the client surface and
        `myMembership` carries the caller's own row (so the list can
        render role + status without a follow-up fetch).
      required:
        - id
        - kind
        - displayName
        - controllerOutwardAccountId
        - controllerUserClerkId
        - createdByUserClerkId
        - isAdminDemo
        - createdAt
        - updatedAt
        - businessDetails
        - myMembership
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/EntityKind"
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        coverPhotoUrl:
          type: string
          nullable: true
        coverColor:
          type: string
          nullable: true
        controllerOutwardAccountId:
          type: integer
        controllerUserClerkId:
          type: string
        createdByUserClerkId:
          type: string
        isAdminDemo:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        businessDetails:
          nullable: true
          $ref: "#/components/schemas/EntityBusinessDetails"
        myMembership:
          nullable: true
          $ref: "#/components/schemas/EntityMember"

    ListMyEntitiesResponse:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/MyEntityListItem"

    ListEntityMembersResponse:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/EntityMemberWithUser"

    CreateEntityBody:
      type: object
      required: [displayName]
      properties:
        kind:
          $ref: "#/components/schemas/EntityKind"
          description: Defaults to `business` when omitted.
        displayName:
          type: string
          description: Workspace label. Trimmed; must be non-empty.
        name:
          type: string
          description: |
            Legacy alias for `displayName` — the server accepts either.
            Prefer `displayName` in new code.
        legalName:
          type: string
          nullable: true
          description: |
            Legal/operating company name. Persisted on the
            `entity_business_details` sidecar when `kind='business'`.
        tagline:
          type: string
          nullable: true
          description: |
            Public tagline. Persisted on the `entity_business_details`
            sidecar when `kind='business'`.

    InviteEntityMemberBody:
      type: object
      required: [targetOutwardAccountId]
      properties:
        targetOutwardAccountId:
          type: integer
          description: |
            Outward account being invited / requested. The membership
            row's `userOutwardAccountId`.
        intent:
          type: string
          enum: [invite, request]
          description: |
            Defaults to `invite` (controller adding someone). Pass
            `request` to issue a self-request to be added — the
            server will reject the call unless the target avatar is
            owned by the caller.

    EntityMemberMutationResponse:
      type: object
      required: [member]
      properties:
        member:
          $ref: "#/components/schemas/EntityMember"

    RespondToEntityMembershipBody:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, decline]

    EntityInviteEntitySummary:
      type: object
      required: [id, kind, name]
      description: Compact entity summary embedded in an invite row.
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/EntityKind"
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        coverPhotoUrl:
          type: string
          nullable: true
        coverColor:
          type: string
          nullable: true

    EntityInviteInviter:
      type: object
      required: [outwardAccountId, kind, displayName]
      description: |
        Compact inviter summary — already merged from the inviter's
        outward_account and owning user so the invite card renders
        without a follow-up fetch.
      properties:
        outwardAccountId:
          type: integer
        kind:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true

    EntityInviteItem:
      type: object
      required:
        - id
        - entityId
        - status
        - role
        - direction
        - createdAt
        - entity
        - inviter
      properties:
        id:
          type: integer
        entityId:
          type: integer
        status:
          $ref: "#/components/schemas/EntityMemberStatus"
        role:
          $ref: "#/components/schemas/EntityMemberRole"
        direction:
          $ref: "#/components/schemas/EntityMemberDirection"
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
          nullable: true
        entity:
          nullable: true
          $ref: "#/components/schemas/EntityInviteEntitySummary"
        inviter:
          nullable: true
          $ref: "#/components/schemas/EntityInviteInviter"

    ListMyEntityInvitesResponse:
      type: object
      required: [invites]
      properties:
        invites:
          type: array
          items:
            $ref: "#/components/schemas/EntityInviteItem"

    EntityAutoCast:
      type: object
      required: [role, direction]
      properties:
        role:
          $ref: "#/components/schemas/EntityMemberRole"
        direction:
          $ref: "#/components/schemas/EntityMemberDirection"

    EntityAutoCastEntityCandidate:
      type: object
      required: [id, kind, name, cast]
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/EntityKind"
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        coverPhotoUrl:
          type: string
          nullable: true
        coverColor:
          type: string
          nullable: true
        cast:
          $ref: "#/components/schemas/EntityAutoCast"

    EntityAutoCastPreviewResponse:
      type: object
      required: [entities, cast]
      description: |
        `entities` is the set of candidate hosts (already filtered to
        ones the caller can invite into and the target isn't already
        on). `cast` is a top-level convenience for the no-entities
        case — present when the caller has zero viable hosts so the
        sheet can still preview the cast.
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/EntityAutoCastEntityCandidate"
        cast:
          nullable: true
          $ref: "#/components/schemas/EntityAutoCast"

    ListEntityMessagesResponse:
      type: object
      required: [messages, total]
      description: |
        Result of `GET /entities/{entityId}/messages`. Simpler than
        `ListMessagesResponse` because there's no DM team-up gate to
        surface inside an entity thread — membership is the gate.
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageItem"
        total:
          type: integer

    MarkEntityMessagesReadResponse:
      type: object
      required: [readAt]
      properties:
        readAt:
          type: string
          format: date-time
          description: Timestamp the read cursor was advanced to.
