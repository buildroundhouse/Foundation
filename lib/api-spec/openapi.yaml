        created before map data was captured. The geocoding itself happens in
        the client (using Google Places against the property's saved address);
        this endpoint only persists the resolved values. The server only writes
        when the property has no existing `placeId`, `latitude` or `longitude`
        — existing place data is never overwritten. Returns the property
        unchanged when it already has place data.
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackfillGeocodeBody"
      responses:
        "200":
          description: Updated property (or unchanged if already had place data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyWithMembers"
        "400":
          description: Invalid request
        "401":
          $ref: "#/components/responses/Unauthorized"
