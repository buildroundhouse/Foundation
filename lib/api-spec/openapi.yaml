      description: |
        Entity-scoped messaging (§11). Messages are keyed by the property
        rather than a recipient — every approved member of the property
        sees the same thread. The caller must have an active
        (`archivedAt IS NULL`) `entity_members` row for the property's
        entity.
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Messages in the property thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPropertyMessagesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: sendPropertyMessage
      tags: [messages]
      summary: Post a message into the property's shared thread
      description: |
        Posts a message into the property thread. Every other approved
        member receives an in-app notification and a push notification.
        The DB row leaves `recipientClerkId` /
        `recipientOutwardAccountId` NULL because the thread identity is
        the property itself.
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Posted message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /properties/me/threads:
    get:
      operationId: listMyEntityThreadsViaProperty
      tags: [messages]
      deprecated: true
      summary: "[Legacy alias] List the entity threads the caller belongs to"
      description: |
        Legacy alias for `GET /entities/me/threads`. Both routes share the
        same handler and the same response shape — entity-scoped, not
        property-scoped. Kept so old clients keep working while the
        canonical entity-scoped endpoint is rolled out. Prefer
        `listMyEntityThreads` (the canonical entity route) for new code.
      responses:
        "200":
          description: Entity threads the caller can see
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMyEntityThreadsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /properties/{propertyId}/messages/read:
    post:
      operationId: markPropertyMessagesRead
      tags: [messages]
      summary: Mark a property thread as read for the caller
      description: |
        Stamps the caller's `messagesLastReadAt` on this property's
        membership row to "now". Idempotent. Membership-gated — a
        non-member receives 403 instead of advancing a cursor on a
        thread they cannot see. The Messages tab calls this on focus
        and after sending a message so the inbox badge stays accurate.
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Read cursor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkPropertyMessagesReadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ---------------------------------------------------------------------------
  # Entities (workspaces) — the canonical relationship primitive after
  # Tasks #662 / #663. Avatars (outward_accounts) participate in entities
  # via `entity_members`; the membership row IS the connection.
  # ---------------------------------------------------------------------------

  /entities:
    post:
      operationId: createEntity
      tags: [entities]
      summary: Found a new entity (business / property)
      description: |
        Creates an entity controlled by the caller's active avatar and
        seeds an `owner` membership for that avatar. The active avatar
        must be allowed to control the chosen entity kind (Trade Pro /
        Facility avatars for `business`; Homeowner for
        `residential_property`; Homeowner / Facility Manager for
        `commercial_property`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityBody"
      responses:
        "201":
          description: Created entity (with optional business sidecar)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityWithBusinessDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /entities/mine:
    get:
      operationId: listMyEntities
      tags: [entities]
      summary: List every entity the active avatar founded or is approved on
      parameters:
        - name: kind
          in: query
          required: false
          description: Optional filter — return only entities of this kind.
          schema:
            $ref: "#/components/schemas/EntityKind"
      responses:
        "200":
          description: Entities the caller participates in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMyEntitiesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /entities/me/invites:
    get:
      operationId: listMyEntityInvites
      tags: [entities]
      summary: List the caller's pending entity invites
      description: |
        Every `entity_members` row where the viewer is the target and
        `status='invited'`. The Invites screen reads this directly —
        there is no separate invites table.
      responses:
        "200":
          description: Pending entity invites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMyEntityInvitesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /entities/me/threads:
    get:
      operationId: listMyEntityThreads
      tags: [messages]
      summary: List the entity threads the caller belongs to
      description: |
        Entity-thread index for the global Inbox. Returns every entity
        the caller is an active member of, paired with the most recent
        message in that entity's shared thread. Both `lastMessage`
        (compact preview) and `unreadCount` (count of inbound unread
        messages) are denormalized so the inbox renders without a
        per-row follow-up fetch.

        Calling `POST /entities/{entityId}/messages/read` clears the
        inbox unread badge for that thread.
      responses:
        "200":
          description: Entity threads the caller can see
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMyEntityThreadsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /entities/auto-cast/preview:
    get:
      operationId: previewEntityAutoCast
      tags: [entities]
      summary: Preview the role + direction `POST /entities/{id}/members` would auto-cast
      description: |
        Returns the entities the caller (acting as their active avatar)
        could invite the target avatar into, plus the role and
        direction the membership would be created with. The
        Add-to-entity sheet uses this to render the
        "Add Sam to Sarah's Dallas Home as worker" preview before the
        user confirms — no membership row is written.
      parameters:
        - name: targetOutwardAccountId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auto-cast preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityAutoCastPreviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Caller has no active avatar to act as.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get an entity profile (with optional business details)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entity profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityWithBusinessDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /entities/{id}/members:
    get:
      operationId: listEntityMembers
      tags: [entities]
      summary: List every membership row on the entity
      description: |
        Returns all `entity_members` rows for the entity (any status).
        Caller must already be an approved member.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Membership rows (with denormalized user + outward account)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntityMembersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: inviteEntityMember
      tags: [entities]
      summary: Invite a person to (or request access to) an entity
      description: |
        Idempotent on a `(entityId, targetOutwardAccountId)` pair —
        re-inviting a previously declined or removed row reactivates
        it. The role + direction are auto-cast from the avatar pair;
        the client never sends a role.

        - `intent="invite"` (default): caller must be an approved
          manager-or-better on the entity.
        - `intent="request"`: target avatar must be one of the
          caller's own outward accounts (you cannot file a join
          request on someone else's behalf).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteEntityMemberBody"
      responses:
        "201":
          description: Created (or reactivated) membership row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityMemberMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Already an active member (`code: "already_member"`) or the
            caller has no active avatar to act as.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entities/{id}/members/{memberId}:
    delete:
      operationId: removeEntityMember
      tags: [entities]
      summary: Remove a membership (or self-leave)
      description: |
        Owners can remove anyone except themselves; members can
        self-leave. The owner row cannot be removed — transfer
        controllership first.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Membership archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /entities/members/{memberId}/respond:
    post:
      operationId: respondToEntityMembership
      tags: [entities]
      summary: Accept or decline an invite (or inbound request)
      description: |
        Flips the same `entity_members` row in place — never writes a
        parallel record.

        - When `status='invited'`: only the recipient (the avatar on
          the row) may decide.
        - When `status='requested'`: only an entity admin may decide.
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToEntityMembershipBody"
      responses:
        "200":
          description: Updated membership row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityMemberMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Membership is not awaiting a response. Body includes
            `code: "not_pending"`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entities/{entityId}/messages:
    get:
      operationId: listEntityMessages
      tags: [messages]
      summary: List the entity's shared message thread
      description: |
        Entity-scoped messaging. Every approved member sees the same
        thread; the caller must have an active (`archivedAt IS NULL`)
        `entity_members` row with `status='approved'`. Reading a
        thread also clears the caller's unread rows for that entity.
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Messages in the entity thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntityMessagesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: sendEntityMessage
      tags: [messages]
      summary: Post a message into the entity's shared thread
      description: |
        Posts a message into the entity thread. Every other approved
        member receives an in-app notification and a push. The DB row
        leaves `recipientClerkId` / `recipientOutwardAccountId` NULL
        because the thread identity is the entity itself.
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Posted message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Caller has no active avatar to send as.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entities/{entityId}/messages/read:
    post:
      operationId: markEntityMessagesRead
      tags: [messages]
      summary: Mark an entity thread as read for the caller
      description: |
        Marks every inbound message in this entity thread as read for
        the caller. Idempotent and membership-gated — a non-member
        receives 403 instead of advancing a cursor on a thread they
        cannot see.
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Read cursor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkEntityMessagesReadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /properties/{propertyId}/work-orders:
