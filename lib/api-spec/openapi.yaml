openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Roundhouse API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: properties
    description: Property operations
  - name: logs
    description: Work log operations
  - name: messages
    description: Messaging operations
  - name: entities
    description: |
      Entity (workspace) lifecycle and membership. After Tasks #662 and
      #663 the canonical relationship primitive is the entity_members
      row — people no longer connect to people, they share entities.
  - name: notifications
    description: Notification operations
  - name: workOrders
    description: Work order and recurring task operations
  - name: storage
    description: Object storage upload and serving endpoints
  - name: invites
    description: Invite operations for bringing new accounts onto Roundhouse
  - name: billing
    description: Per-skin billing for paid capability bundles
  - name: admin-demo-profiles
    description: Admin-only management of demo user profiles
  - name: concierge
    description: AI concierge timeline assistant

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/personal:
    get:
      operationId: getMyPersonalProfile
      tags: [users]
      summary: Get my personal profile (raw, never overlaid by the active outward account)
      responses:
        "200":
          description: Personal profile fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateMyPersonalProfile
      tags: [users]
      summary: Update my personal profile (only personal fields, never per-account fields)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonalProfileBody"
      responses:
        "200":
          description: Updated personal profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by name, username, or service offered
      description: |
        Provide `q`, `service`, or both. When both are present, results match
        the text query AND offer the named service. If neither is provided
        the endpoint returns an empty `users` list.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: service
          in: query
          required: false
          description: |
            Filters to users whose profile services array contains an entry whose
            `name` matches this value (case-insensitive, exact). Use the curated
            preset service category labels.
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /businesses/search:
    get:
      operationId: searchBusinesses
      tags: [users]
      summary: Search trade-pro businesses by category/ZIP and/or by name
      description: |
        Returns trade-pro accounts matching the supplied filters. At least one of
        `tradeType`, `zip`, or `name` must be provided. Filters compose with AND.
        `name` matches either the company name or the owner's display name.
      parameters:
        - name: tradeType
          in: query
          required: false
          description: One of the trade category keys (e.g. plumber, electrician, hvac).
          schema:
            type: string
        - name: zip
          in: query
          required: false
          description: |
            5-digit ZIP code matched exactly against the trade pro's structured
            primary ZIP or membership in their additional served ZIPs. Non-digit
            characters are stripped; values that do not yield a 5-digit ZIP
            return no matches.
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Substring matched against company name or the owner's display name.
          schema:
            type: string
      responses:
        "200":
          description: Matching businesses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchBusinessesResponse"
        "400":
          description: No filter supplied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{userId}/connect:
    post:
      operationId: connectToUser
      tags: [users]
      summary: Connect to another user with a relationship kind
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectUserRequest"
      responses:
        "200":
          description: Connection saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: disconnectFromUser
      tags: [users]
      summary: Remove a connection to another user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection removed
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{userId}/team-up/respond:
    post:
      operationId: respondToTeamUpRequest
      tags: [users]
      summary: Accept or decline an incoming team-up request (#501)
      parameters:
        - name: userId
          in: path
          required: true
          description: The clerk id of the user who SENT the request.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              allOf:
                - $ref: "#/components/schemas/ConnectionTagFields"
              properties:
                action:
                  type: string
                  enum: [accept, decline]
                requesterOutwardAccountId:
                  type: integer
                  nullable: true
                  description: |
                    Outward-account id of the requester skin to respond
                    to. Required when the same requester user has more
                    than one pending request to this responder skin
                    (returned by /users/me/team-up-requests).
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                type: object
                required: [ok, status]
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                    enum: [accepted, declined]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No pending request from this user
        "409":
          description: |
            Multiple pending requests from this user; the caller must
            specify `requesterOutwardAccountId` to disambiguate.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  code: { type: string, enum: [team_up_ambiguous] }

  /users/me/connections/{id}:
    patch:
      operationId: updateMyConnectionTag
      tags: [users]
      summary: Update tag fields on a single connection (#502)
      description: |
        #502 — Update the universal label/chip fields on one
        user_connections row. Authorization is split per field:
          - `classification` may only be set by the *from* side.
          - `serviceTitle`, `onSiteIdentity` (+ `onSiteIdentityOther`),
            and `chip` (+ `chipOther`) may only be set by the *to* side.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionTagFields"
      responses:
        "200":
          description: Updated connection
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  connection:
                    type: object
                    allOf:
                      - $ref: "#/components/schemas/ConnectionTagFields"
                    properties:
                      id: { type: integer }
                      kind:
                        $ref: "#/components/schemas/ConnectionKind"
        "400":
          description: Invalid input
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is not on this connection or is on the wrong side for the requested field
        "404":
          description: Connection not found

  /users/me/team-seats/{seatId}/chip:
    patch:
      operationId: updateMyTeamSeatChip
      tags: [users]
      summary: Update my own teammate chip on a team seat (#502)
      description: |
        #502 — A teammate updates the chip rendered next to their name
        on their own team seat. The chip is validated against the
        company skin's curated list (Trade Pro vs Facility).
      parameters:
        - name: seatId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                chip:
                  type: string
                  nullable: true
                chipOther:
                  type: string
                  nullable: true
                  maxLength: 80
      responses:
        "200":
          description: Updated chip
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  chip:
                    type: string
                    nullable: true
                  chipOther:
                    type: string
                    nullable: true
        "400":
          description: Invalid chip
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Seat not found

  /users/me/team-seat-invites:
    get:
      operationId: listMyTeamSeatInvites
      tags: [users]
      summary: List my pending team-seat invites (#522)
      description: |
        #522 — Pending team-seat invites the signed-in user has been
        offered. Includes the company skin's `kind` so the mobile
        invites screen can show the right curated chip vocabulary at
        acceptance time.
      responses:
        "200":
          description: Pending team-seat invites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyTeamSeatInvitesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/team-seat-invites/{seatId}/accept:
    post:
      operationId: acceptMyTeamSeatInvite
      tags: [users]
      summary: Accept a team-seat invite, optionally setting a chip (#522)
      description: |
        #522 — Accept a pending team-seat invite. The teammate may
        also pick the chip rendered next to their name on the team
        roster; the chip is validated against the inviting company
        skin's curated list (Trade Pro vs Facility).
      parameters:
        - name: seatId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                chip:
                  type: string
                  nullable: true
                chipOther:
                  type: string
                  nullable: true
                  maxLength: 80
      responses:
        "200":
          description: Invite accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, seatId, skinId]
                properties:
                  ok: { type: boolean }
                  seatId: { type: integer }
                  skinId: { type: integer }
                  chip:
                    type: string
                    nullable: true
                  chipOther:
                    type: string
                    nullable: true
        "400":
          description: Invalid chip
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Invite not found

  /users/me/team-seat-invites/{seatId}/decline:
    post:
      operationId: declineMyTeamSeatInvite
      tags: [users]
      summary: Decline a pending team-seat invite (#522)
      parameters:
        - name: seatId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Invite declined
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/team-up-requests:
    get:
      operationId: listMyTeamUpRequests
      tags: [users]
      summary: List my pending team-up requests (incoming + outgoing) (#501)
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyTeamUpRequestsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/connection-status:
    get:
      operationId: getConnectionStatus
      tags: [users]
      summary: Get current user's connection state for a list of clerk IDs
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated list of clerk IDs to check
          schema:
            type: string
      responses:
        "200":
          description: Connection states (only present when a row exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/relationships:
    get:
      operationId: getMyRelationships
      tags: [users]
      summary: Get the current user's people grouped by relationship type
      responses:
        "200":
          description: Categorized people
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/notification-prefs:
    get:
      operationId: listMyNotificationPrefs
      tags: [users]
      summary: List the current user's per-type notification preferences
      responses:
        "200":
          description: Preferences list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPrefsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateMyNotificationPref
      tags: [users]
      summary: Enable or disable one notification type for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPrefBody"
      responses:
        "200":
          description: Updated preference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPref"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/notification-prefs/bulk:
    put:
      operationId: bulkUpdateMyNotificationPrefs
      tags: [users]
      summary: Enable or disable many notification types for the current user at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateNotificationPrefsBody"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPrefsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/property-notification-overrides:
    get:
      operationId: listMyPropertyNotificationOverrides
      tags: [users]
      summary: List properties where the current user has overridden the global job alert preferences
      responses:
        "200":
          description: Per-property notification overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyNotificationOverridesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/property-notification-overrides/bulk:
    put:
      operationId: bulkUpdateMyPropertyNotificationOverrides
      tags: [users]
      summary: Apply a job alert override (or reset) to several properties at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdatePropertyNotificationOverridesBody"
      responses:
        "200":
          description: Updated overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpdatePropertyNotificationOverridesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/property-notification-overrides/{propertyId}:
    delete:
      operationId: clearMyPropertyNotificationOverride
      tags: [users]
      summary: Reset a property's job alert overrides back to the global default
      parameters:
        - in: path
          name: propertyId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Override cleared
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid property id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Membership not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/me/push-token:
    put:
      operationId: updatePushToken
      tags: [users]
      summary: Register or clear the current user's Expo push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePushTokenBody"
      responses:
        "200":
          description: Token saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePushTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/me/identity:
    put:
      operationId: updateMyIdentity
      tags: [users]
      summary: Set username and avatar (required identity layer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdentityBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/username-available:
    get:
      operationId: checkUsernameAvailable
      tags: [users]
      summary: Check whether a username is available
      parameters:
        - name: u
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsernameAvailability"

  /users/me/modes:
    get:
      operationId: listMyModes
      tags: [users]
      summary: List the current user's activated modes
      responses:
        "200":
          description: Activated modes plus active mode id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: activateMode
      tags: [users]
      summary: Activate a new mode for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateModeBody"
      responses:
        "201":
          description: Created mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserModeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/modes/{modeId}:
    put:
      operationId: completeModeIntake
      tags: [users]
      summary: Save Layer 1 intake answers and mark intake complete
      parameters:
        - name: modeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteIntakeBody"
      responses:
        "200":
          description: Updated mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserModeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: discardMode
      tags: [users]
      summary: Discard a not-yet-completed mode
      description: |
        Removes a `user_modes` row that has not yet had its intake
        completed (i.e. `intakeCompletedAt` is null), clearing any
        draft intake data. Lets a user back out of an in-progress
        avatar skin during onboarding so it no longer counts toward
        their activated modes. Rejected with 409 if the mode has
        already been completed — completed avatars are managed from
        Profile, not abandoned.
      parameters:
        - name: modeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Mode discarded
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Mode intake already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /billing/me:
    get:
      operationId: getMyBilling
      tags: [billing]
      summary: Payment method + per-skin capability rows for the private account
      responses:
        "200":
          description: Billing summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/payment-method:
    post:
      operationId: addBillingPaymentMethod
      tags: [billing]
      summary: Start a hosted Stripe Checkout setup session for collecting a card
      description: |
        Returns a hosted Stripe Checkout setup-mode URL the mobile app
        should open in a browser. When the Stripe integration is not
        connected, `checkoutUrl` is null and the legacy placeholder
        behavior is preserved (used by tests).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, payerClerkId]
                properties:
                  ok:
                    type: boolean
                  payerClerkId:
                    type: string
                  checkoutUrl:
                    type: string
                    nullable: true
                    description: |
                      Hosted Stripe Checkout setup URL. Null when Stripe
                      is not configured for this deployment.
                  sessionId:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Stripe rejected the setup-session request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /outward-accounts/{id}/billing/enable:
    post:
      operationId: enableOutwardAccountBilling
      tags: [billing]
      summary: Enable expanded capabilities on a skin owned by the caller
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Subscription created or restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /outward-accounts/{id}/billing/cancel:
    post:
      operationId: cancelOutwardAccountBilling
      tags: [billing]
      summary: Cancel expanded capabilities on a skin owned by the caller
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
