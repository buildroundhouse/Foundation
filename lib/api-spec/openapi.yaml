    OutwardAccount:
      type: object
      required: [id, ownerClerkId, kind, capabilityState, lastInitialOnly, createdAt]
      properties:
        id:
          type: integer
        ownerClerkId:
          type: string
        kind:
          $ref: "#/components/schemas/UserModeKind"
        title:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        capabilityState:
          $ref: "#/components/schemas/CapabilityState"
        lastInitialOnly:
          type: boolean
          description: |
            #640 — When true, the owner's name shown for this skin is
            rendered as "First L." everywhere it surfaces (People search
