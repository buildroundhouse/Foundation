        and their actual mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptAppInviteRequest"
      responses:
        "200":
          description: Invite signed up (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invite already accepted or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

