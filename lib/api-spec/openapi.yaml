        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Payment required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /concierge/send-draft:
    post:
      tags: [concierge]
      summary: Send a concierge-drafted note to a recipient via the chosen channel
      operationId: postConciergeSendDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConciergeSendDraftBody"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConciergeSendDraftResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "402":
          description: Payment required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Gone:
      description: |
        The endpoint has been permanently removed. Body always carries a
        machine-readable `code` (e.g. `dm_removed`) so clients can
        detect deprecated routes and route around them.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GoneResponse"

  schemas:
    ConciergeProposedAction:
      type: object
      required: [type, label, payload]
      properties:
        type:
          type: string
          enum:
            [
              draft_client_note,
              create_reminder,
              log_work_item,
              open_job,
              pep_talk,
            ]
        label: { type: string }
        payload:
          type: object
          additionalProperties: true
    ConciergeMessage:
      type: object
      required: [id, role, content, proposedActions, createdAt]
      properties:
        id: { type: integer }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        proposedActions:
          type: array
          items: { $ref: "#/components/schemas/ConciergeProposedAction" }
        createdAt: { type: string, format: date-time }
    ConciergeHistoryResponse:
      type: object
      required: [messages]
      properties:
        conversationId: { type: integer }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ConciergeMessage" }
    ConciergeSuggestionsResponse:
      type: object
      required: [suggestions, pepTalk]
      properties:
        suggestions:
          type: array
          items: { type: string }
        pepTalk:
          type: string
          nullable: true
    ConciergeRecipient:
      type: object
      required: [outwardAccountId, name]
      properties:
        outwardAccountId: { type: integer }
        name: { type: string }
        kind:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
    ConciergeRecipientsResponse:
      type: object
      required: [recipients]
      properties:
        recipients:
          type: array
          items: { $ref: "#/components/schemas/ConciergeRecipient" }
    ConciergeSendDraftBody:
      type: object
      required: [content]
      properties:
        recipientOutwardAccountId:
          type: integer
          nullable: true
          description: The outward-account counterpart to send to. Required for the "in_app" channel. Omit when sending to a brand-new contact via SMS or email.
        recipientName:
          type: string
          nullable: true
          description: Free-form name for a brand-new contact (no outward-account counterpart yet). Required when recipientOutwardAccountId is omitted; used as the label in the system note.
        content: { type: string }
        channel:
          type: string
          enum: [in_app, sms, email]
          default: in_app
        subject:
          type: string
          nullable: true
        recipientPhone:
          type: string
          nullable: true
          description: Phone number to send to when channel is "sms". Required when sending to a brand-new contact, or when an existing recipient has no phone on file.
        recipientEmail:
          type: string
          nullable: true
          description: Email address to send to when channel is "email". Required when sending to a brand-new contact, or when an existing recipient has no email on file.
    ConciergeSendDraftResponse:
      type: object
      required: [ok, channel]
      properties:
        ok: { type: boolean }
        channel:
          type: string
          enum: [in_app, sms, email]
        recipientOutwardAccountId:
          type: integer
          nullable: true
          description: The outward-account counterpart that received the message. Null when the draft was sent to a brand-new contact (SMS/email only).
        messageId:
          type: integer
          nullable: true
          description: Set only for in-app sends; null for SMS/email channels.
        composeUri:
          type: string
          nullable: true
          description: When set, the client should open this URI (sms:/mailto:) to finish composing the message in the device's native app.
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        username:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
        website:
          type: string
          nullable: true
        officePhone:
          type: string
          nullable: true
        cellPhone:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        instagram:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        slogan:
          type: string
          nullable: true
        companyLogoUrl:
          type: string
          nullable: true
        headerImageUrl:
          type: string
          nullable: true
        licenseState:
          type: string
          nullable: true
        licenseType:
          type: string
          nullable: true
        licenseNumber:
          type: string
          nullable: true
        insuranceCarrier:
          type: string
          nullable: true
        insurancePolicyNumber:
          type: string
          nullable: true
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceEntry"
        visibility:
          $ref: "#/components/schemas/ProfileVisibility"
        identityCompletedAt:
          type: string
          format: date-time
          nullable: true
        isAdmin:
          type: boolean
          description: True when the user is on the Roundhouse admin allowlist (env or users.is_admin). Drives the "skip intake, land in Admin Hub" routing.
        lastActiveModeId:
          type: integer
          nullable: true
        notifyJobStarted:
          type: boolean
        notifyJobCompleted:
          type: boolean
        hasPushToken:
          type: boolean
        pushTokenUpdatedAt:
          type: string
          format: date-time
          nullable: true
        addressZip:
          type: string
          nullable: true
          description: Homeowner billing/area ZIP — used to filter the area feed and deals.
        serviceZips:
          type: array
          items:
            type: string
          description: Trade Pro service-area ZIPs — used by pro search and deal targeting.
        sponsorBrandName:
          type: string
          nullable: true
          description: Curated brand sponsor for Platinum-tier pros — surfaces as a "Sponsored by" badge.
        connectionTag:
          allOf:
            - $ref: "#/components/schemas/UserConnectionTag"
          nullable: true
          description: |
            Per-viewer label/chip the viewer has stored on their connection
            with this user (task #502). Populated only on endpoints that know
            the viewer's active outward account (e.g. work-order author rows
            and comment authors). Null when there is no accepted connection
            from the viewer's active skin to this user.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - email
        - name
        - username
        - avatarUrl
        - services
        - visibility
        - notifyJobStarted
        - notifyJobCompleted
        - hasPushToken
        - serviceZips
        - createdAt
        - updatedAt

    UserConnectionTag:
      type: object
      description: |
        Tag fields composed into the `Service · Identity` line shown
        under a person's name. Source of truth: the viewer's row in
        `user_connections`. See `composeLabelChipLine` in the client.
