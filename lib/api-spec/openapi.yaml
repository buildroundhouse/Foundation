          type: string
          format: date-time

    ProUserSuccessStoriesResponse:
      type: object
      required: [stories]
      properties:
        stories:
          type: array
          items:
            $ref: "#/components/schemas/ProUserSuccessStory"

    RelationshipPerson:
      type: object
      required: [id, clerkId, name, username, roleContext]
      allOf:
        - $ref: "#/components/schemas/ConnectionTagFields"
      properties:
        connectionId:
          type: integer
          nullable: true
          description: |
            #502 — id of the user_connections row for this directed
            edge. Lets the UI PATCH the row's tag fields without
            re-deriving from the pair.
        connectionKind:
          $ref: "#/components/schemas/ConnectionKind"
          nullable: true
        id:
          type: integer
        clerkId:
          type: string
        name:
          type: string
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        activeModeKind:
          $ref: "#/components/schemas/UserModeKind"
          nullable: true
        roleContext:
          type: string
        counterpartOutwardAccountId:
          type: integer
          nullable: true
          description: |
            The id of the counterpart's outward account ("skin") this
            connection points at. Lets the client tell two distinct
            connections to the same person apart, and pair the row with
            its `counterpartArchivedAt` flag.
        counterpartArchivedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When the counterpart's outward account was retired, or null if
            it is still live. Connections to a retired profile remain in
            the relationships list (see #340) so prior threads/jobs stay
            reachable, but the UI should mark the row as retired and
            disable actions that would target the absent profile (new
            message, new invite, new job assignment).
        hasActiveAssignment:
          type: boolean
          description: |
            #503 — true when this person currently has at least one
            non-archived `entity_members` row tied to this connection.
            When false, the UI renders a "Connected — no active work"
            label so it's obvious that the connection is accepted but
            the person hasn't been put on a property yet.

