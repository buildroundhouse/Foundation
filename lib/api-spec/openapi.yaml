          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /app-invites/accept:
    post:
      operationId: acceptAppInvite
      tags: [invites]
      summary: Mark a Share Round House invite as signed up after intake
      description: |
        Called by the client once the recipient finishes intake while having a
        pending app-invite token in local storage. Marks the invite
        `signed_up`, attaches the new user id and the actual mode they signed
        up as, awards the inviter 10 points (idempotent on invite id), and
