  /invites/business:
    get:
      operationId: listMyBusinessInvites
      tags: [invites]
      summary: List the current user's recent business invites
      description: |
        Returns up to 100 of the most recently created business invites the
        signed-in user has sent, newest first. Powers the "My invites" screen
        so the sender can see status (pending/sent/failed/accepted) and
        retrigger failed sends.
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyBusinessInvitesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: sendBusinessInvite
      tags: [invites]
      summary: Create a business invite record and email the recipient
      description: |
        Records a pending business invite from the current user and sends the
        invite email directly to the recipient. The Find > Businesses invite
        modal calls this endpoint instead of opening the device's mail app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendBusinessInviteRequest"
      responses:
        "200":
          description: Invite created and email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Email provider rejected the send
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Email service is not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invites/business/{token}:
    get:
      operationId: getBusinessInvite
      tags: [invites]
      summary: Look up a business invite by its token
      description: |
        Public endpoint used by the invite landing page so the recipient can
        see who invited them (and what business name was used) before signing
        in. Does not mutate state.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessInviteLookupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /invites/business/accept:
    post:
      operationId: acceptBusinessInvite
      tags: [invites]
      summary: Accept a business invite as the signed-in recipient
      description: |
        Marks the invite identified by `token` as accepted (sets `acceptedAt`)
        and creates a two-way `collaborator` connection between the inviter
        and the current authenticated user so the invite shows up in both
        people's relationships.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptBusinessInviteRequest"
      responses:
        "200":
          description: Invite accepted (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptBusinessInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /app-invites:
    get:
      operationId: listMyAppInvites
      tags: [invites]
      summary: List the current user's Round House SMS invites with totals
      description: |
        Returns the list of "Share Round House" SMS invites the signed-in user
        has sent, newest first, plus rolled-up summary totals (sent count,
        signups completed, conversion rate, points earned from sharing).
        Powers the "People I've invited" view on Profile.
      responses:
        "200":
          description: My app invites + summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyAppInvitesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createAppInvite
      tags: [invites]
      summary: Create or reuse a Share Round House SMS invite
      description: |
        Creates a tracked `app_invite` for the recipient phone number (or
        reuses the existing not-yet-accepted invite for the same number) and
        returns the invite plus a tokenized signup link the client appends to
        the SMS body. Send-side messaging is handled by the device's SMS app —
        nothing is sent server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppInviteRequest"
      responses:
        "200":
          description: Invite created or reused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Daily app-invite cap reached for this inviter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /app-invites/share-context:
    get:
      operationId: getAppInviteShareContext
      tags: [invites]
      summary: Get sender info used to compose the Share Round House SMS
      description: |
        Returns the signed-in user's first name, company name, primary property
        name, and active mode kind so the Share Round House modal can show an
        inline hint when a required field is missing for the SMS template.
      responses:
        "200":
          description: Sender share context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInviteShareContext"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /app-invites/{id}/resend:
    post:
      operationId: resendAppInvite
      tags: [invites]
      summary: Reopen the SMS app for an existing Share Round House invite
      description: |
        Returns a freshly composed SMS deep link for the same invite token so
        the sender can reopen their messaging app without creating a duplicate
        record. Only the original inviter can resend, and only while the invite
        is still in the `sent` state.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SMS link regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invite is no longer resendable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /app-invites/{id}/cancel:
    post:
      operationId: cancelAppInvite
      tags: [invites]
      summary: Cancel an open Share Round House invite the sender no longer wants delivered
      description: |
        Flips a `sent` invite owned by the caller to `cancelled` so its slot
        in the rolling 24h send cap frees up. Idempotent only on `sent`
        rows: already-signed-up, already-cancelled, and expired invites
        return 409.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invite cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAppInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invite is no longer cancellable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /app-invites/by-token/{token}:
    get:
      operationId: getAppInviteByToken
      tags: [invites]
      summary: Look up a Share Round House invite by its token
      description: |
        Public endpoint used by the invite landing page so the recipient can
        see who invited them before signing up. Does not mutate state.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite found
          content:
            application/json:
              schema:
